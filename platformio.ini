; Cave Escape — Elecrow CrowPanel 4.3" Basic (ESP32-S3-WROOM-1-N4R2)
; Platform pinned to espressif32@6.5.0 = Arduino core 2.0.14, the version
; Elecrow validated for this board (wiki: core 2.0.14/2.0.15). Do not float
; to 3.x without re-testing — API breaks.

[env:crowpanel_43]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; --- Memory: N4R2 = 4MB QIO flash + 2MB QUAD (qspi) PSRAM. NOT octal. ---
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
board_build.partitions = default.csv

build_flags =
    -DBOARD_HAS_PSRAM
    ; USB-C is a UART bridge to UART0 on this board, not native USB CDC:
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DLGFX_USE_V1
    -Iinclude

lib_deps =
    ; Elecrow validated 1.1.8; 1.1.x is API-stable. If display artifacts
    ; appear at M0, fall back to =1.1.8 exactly.
    lovyan03/LovyanGFX@^1.1.16

monitor_speed = 115200
